<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Daily Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c0f;
  --bg2:#151518;
  --bg3:#1e1e24;
  --bg4:#28282f;
  --bg5:#32323b;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --border3:rgba(255,255,255,0.2);
  --text:#f2f2f2;
  --text2:#aaa;
  --text3:#666;
  --amber:#f0a830;
  --teal:#2eb87e;
  --purple:#9d8fe8;
  --red:#e05555;
  --green:#2eb87e;
  --r:16px;
  --r-sm:10px;
  --r-xs:7px;
}
html{-webkit-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
.no-select{user-select:none;-webkit-user-select:none;}

/* HEADER */
.header{padding:60px 20px 22px;background:linear-gradient(170deg,#1a1a24 0%,#0f0f14 100%);border-bottom:1px solid var(--border2);}
.date-label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;font-weight:600;}
.greeting{font-size:32px;font-weight:800;color:var(--text);margin-bottom:20px;letter-spacing:-.5px;line-height:1.1;}

/* PROGRESS */
.progress-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:18px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;}
.progress-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(157,143,232,0.1) 0%,transparent 70%);pointer-events:none;}
.ring-wrap{position:relative;flex-shrink:0;}
.ring-wrap svg{display:block;}
.ring-bg{fill:none;stroke:var(--bg5);stroke-width:5;}
.ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1);}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
.progress-info{flex:1;min-width:0;}
.progress-main{font-size:16px;font-weight:700;color:var(--text);line-height:1.2;}
.progress-sub{font-size:12px;color:var(--text2);margin-top:4px;font-weight:500;}
.btn-row{display:flex;gap:8px;align-items:center;margin-left:auto;flex-shrink:0;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border-radius:999px;padding:8px 16px;cursor:pointer;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);transition:all .15s;-webkit-tap-highlight-color:transparent;letter-spacing:.01em;}
.btn:active{transform:scale(0.95);opacity:.8;}
.btn.active{background:rgba(157,143,232,0.2);border-color:var(--purple);color:var(--purple);}
.btn.danger{background:rgba(224,85,85,0.1);border-color:rgba(224,85,85,0.3);color:var(--red);}
.btn-sm{font-size:12px;padding:5px 12px;}
.btn-icon{width:32px;height:32px;border-radius:50%;padding:0;font-size:15px;flex-shrink:0;}
.btn-ghost{background:none;border:none;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent;transition:color .15s;}
.btn-ghost:hover{color:var(--text2);}

/* SECTION */
.section{padding:28px 20px 0;}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.section-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px 5px 8px;border-radius:999px;border:1px solid var(--border2);background:var(--bg3);}
.section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.section-name{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);}
.section-count{font-size:12px;color:var(--text3);margin-left:auto;font-weight:600;font-variant-numeric:tabular-nums;}

/* ITEM CARDS */
.item-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:8px;display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
.item-card::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .1s;}
.item-card:active::after{background:rgba(255,255,255,0.03);}
.item-card.done{opacity:.35;}
.item-card.done .item-label{text-decoration:line-through;}
.item-card.dragging{opacity:.4;transform:scale(.98);}
.item-card.drag-over{border-color:var(--purple);background:rgba(157,143,232,0.05);}

.check-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--border3);background:var(--bg4);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:inset 0 1px 3px rgba(0,0,0,0.4);}
.item-card.done .check-btn{box-shadow:0 2px 8px rgba(0,0,0,0.3);}

.item-label{flex:1;font-size:16px;font-weight:500;color:var(--text);line-height:1.3;}
.item-edit-input{flex:1;font-size:16px;font-weight:500;color:var(--text);background:none;border:none;outline:none;font-family:inherit;padding:0;line-height:1.3;}

.edit-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}

/* GROUP */
.group-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.group-header{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s;}
.group-header:active{background:var(--bg3);}
.group-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border3);background:var(--bg4);flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 3px rgba(0,0,0,0.4);}
.group-label{flex:1;font-size:16px;font-weight:700;color:var(--text);}
.group-progress{font-size:12px;color:var(--text3);font-weight:600;}
.group-chevron{font-size:11px;color:var(--text3);transition:transform .2s;margin-left:4px;}
.group-chevron.open{transform:rotate(180deg);}
.group-children{border-top:1px solid var(--border);}
.group-child{display:flex;align-items:center;gap:12px;padding:13px 16px 13px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;}
.group-child:last-child{border-bottom:none;}
.group-child:active{background:var(--bg3);}
.group-child.done{opacity:.35;}
.group-child.done .item-label{text-decoration:line-through;}
.child-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border3);background:var(--bg4);flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 2px rgba(0,0,0,0.3);}

/* ADD ROW */
.add-card{background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--r);margin-bottom:8px;display:flex;align-items:center;gap:12px;padding:14px 16px;}
.add-card input{flex:1;font-size:15px;color:var(--text);background:none;border:none;outline:none;font-family:inherit;font-weight:500;}
.add-card input::placeholder{color:var(--text3);}

/* TASK LIST */
.task-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:8px;display:flex;align-items:center;gap:10px;padding:14px 16px;-webkit-tap-highlight-color:transparent;position:relative;}
.task-card.done{opacity:.35;}
.num-badge{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.num-badge.top{background:var(--purple);color:#fff;box-shadow:0 3px 10px rgba(157,143,232,0.5);}
.num-badge.rest{background:var(--bg4);color:var(--text3);border:1px solid var(--border2);}
.task-label{flex:1;font-size:15px;font-weight:500;color:var(--text);cursor:pointer;line-height:1.3;}
.task-card.done .task-label{text-decoration:line-through;color:var(--text3);}
.task-edit-input{flex:1;font-size:15px;font-weight:500;color:var(--text);background:none;border:none;outline:none;font-family:inherit;}

/* PILLS */
.pills-wrap{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0;}
.intent-pill{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:999px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;transition:all .15s;font-size:14px;font-weight:500;color:var(--text);-webkit-tap-highlight-color:transparent;}
.intent-pill:active{transform:scale(.96);}
.intent-pill.done{opacity:.4;background:var(--bg2);}
.intent-pill.done .pill-label{text-decoration:line-through;color:var(--text3);}
.pill-check{color:var(--teal);font-size:12px;font-weight:700;}

/* COMING UP */
.coming-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;padding:15px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;}
.coming-card:active{background:var(--bg3);}
.coming-card.done{opacity:.35;}
.coming-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border3);background:var(--bg4);flex-shrink:0;margin-top:4px;}
.coming-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.3;}
.coming-card.done .coming-title{text-decoration:line-through;}
.coming-note{font-size:13px;color:var(--text2);margin-top:4px;line-height:1.5;}

/* WIDGET SECTION */
.widget-section{padding:28px 20px 0;}
.widget-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.widget-label{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);flex:1;}
.widget-count{font-size:12px;color:var(--text3);font-weight:600;}

/* DIVIDER */
.hint{font-size:11px;color:var(--text3);text-align:center;padding:10px 0 0;font-weight:500;letter-spacing:.03em;}

/* DRAG GHOST */
.touch-dragging{position:fixed;pointer-events:none;z-index:1000;opacity:.85;transform:scale(1.03);box-shadow:0 8px 30px rgba(0,0,0,0.5);border-radius:var(--r);}
</style>
</head>
<body>
<div id="app"></div>
<script>
var KEYS={checks:'dd_checks',wChecks:'dd_wchecks',items:'dd_items',wItems:'dd_witems',bp:'dd_bp',tasks:'dd_tasks',lastReset:'dd_lastreset',weekReset:'dd_weekreset'};
var DEFAULT_ITEMS={
  am:[
    {id:'am-0',label:'Up by 6:30'},
    {id:'am-meds',label:'Meds',group:['Bupropion','Minoxidil','Microdose']},
    {id:'am-1',label:'Stretch'},
    {id:'am-2',label:'Coffee'},
    {id:'am-3',label:'Smoothie/Brekky'},
    {id:'am-4',label:'Hydrate'},
    {id:'am-5',label:'Dishes'},
    {id:'am-6',label:'Brush teeth'},
    {id:'am-7',label:'Shower'},
    {id:'am-cr',label:'Creatine'},
    {id:'am-8',label:'Reading hour'},
    {id:'am-9',label:'Family walk'}
  ],
  midday:[
    {id:'mid-0',label:'Hydrate'},
    {id:'mid-1',label:'Interaction with a rando'},
    {id:'mid-2',label:'Give a compliment'},
    {id:'mid-3',label:'Step outside'},
    {id:'mid-4',label:'Walk around the block'},
    {id:'mid-5',label:'Quick body scan / posture check'},
    {id:'mid-6',label:"Text someone you've been meaning to check in on"},
    {id:'mid-7',label:'Check in on your wife'},
    {id:'mid-8',label:'Send one kind message'},
    {id:'mid-9',label:'No-phone lunch'},
    {id:'mid-10',label:'5 minutes of nothing'},
    {id:'mid-11',label:"Write one thing you're grateful for"},
    {id:'mid-12',label:'Tidy one thing'},
    {id:'mid-13',label:'Drink a full glass of water'},
    {id:'mid-14',label:'Review your PM list'}
  ],
  pm:[
    {id:'pm-0',label:'PM stretch'},
    {id:'pm-1',label:'Floss'},
    {id:'pm-2',label:'Brush'},
    {id:'pm-3',label:'Shower'},
    {id:'pm-4',label:'Brush'},
    {id:'pm-5',label:'Lotion'},
    {id:'pm-6',label:'Marinate'},
    {id:'pm-cr',label:'Creatine (loading - remove after week 1)'},
    {id:'pm-7',label:'Restore hovel'},
    {id:'pm-8',label:'Pick Hatch routine/alarm'}
  ]
};
var DEFAULT_WEEKLY=['Be in nature','Call someone','Volunteer','Craft time','Evening walk','Skate','Cut nails','Shaved','Serious bike ride'];
var DEFAULT_TASKS=[
  {id:'t1',label:'Do taxes',done:false},
  {id:'t2',label:'Unpack Vegas',done:false},
  {id:'t3',label:'Make bookshelf by bed make sense',done:false},
  {id:'t4',label:'10 min in the study',done:false},
  {id:'t5',label:'Clear hovel for Big Dog',done:false},
  {id:'t6',label:'Bus Adventure',done:false},
  {id:'t7',label:'Office work a fuera',done:false},
  {id:'t8',label:'Call Duhanky / Phil / Morty',done:false}
];
var DEFAULT_BP=[{id:1,title:'Duhanky wedding trip',note:'',done:false}];
var SECTIONS=['am','midday','pm'];
var SEC_META={am:{label:'Morning',accent:'#f0a830'},midday:{label:'Midday',accent:'#2eb87e'},pm:{label:'Evening',accent:'#9d8fe8'}};

function ld(k,fb){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch(e){return fb;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function getResetKey(){var d=new Date();if(d.getHours()<5)d.setDate(d.getDate()-1);return d.toDateString();}
function getWeekKey(){var d=new Date(),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);return new Date(new Date().setDate(diff)).toDateString();}
function countItems(arr){return arr.reduce(function(s,it){return s+(it.group?it.group.length:1);},0);}
function countDone(arr,checks,sec){
  return arr.reduce(function(s,it){
    if(it.group)return s+it.group.filter(function(_,i){return checks[sec+'-'+it.id+'-'+i];}).length;
    return s+(checks[it.id]?1:0);
  },0);
}
function mk(tag,cls,style){var d=document.createElement(tag);if(cls)d.className=cls;if(style)d.style.cssText=style;return d;}
function ap(p){for(var i=1;i<arguments.length;i++)if(arguments[i])p.appendChild(arguments[i]);return p;}
function svgCheck(size,stroke,color){
  var ns='http://www.w3.org/2000/svg';
  var s=document.createElementNS(ns,'svg');s.setAttribute('width',size);s.setAttribute('height',size);s.setAttribute('viewBox','0 0 10 10');s.setAttribute('fill','none');
  var p=document.createElementNS(ns,'polyline');p.setAttribute('points','1.5,5 4,7.5 8.5,2.5');p.setAttribute('stroke',color||'white');p.setAttribute('stroke-width',stroke||'2');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');
  return ap(s,p);
}

var state={
  items:ld(KEYS.items,DEFAULT_ITEMS),checks:{},
  wItems:ld(KEYS.wItems,DEFAULT_WEEKLY),wChecks:{},
  bp:ld(KEYS.bp,DEFAULT_BP),tasks:ld(KEYS.tasks,DEFAULT_TASKS),
  editMode:false,expandedGroups:{},addingSection:null,
  editingItem:null,showAddWeekly:false,showAddBP:false,showAddTask:false,
  editingTask:null
};
(function(){
  var rk=getResetKey();
  if(ld(KEYS.lastReset,null)!==rk){sv(KEYS.checks,{});sv(KEYS.lastReset,rk);}else{state.checks=ld(KEYS.checks,{});}
  var wk=getWeekKey();
  if(ld(KEYS.weekReset,null)!==wk){sv(KEYS.wChecks,{});sv(KEYS.weekReset,wk);}else{state.wChecks=ld(KEYS.wChecks,{});}
})();

// Touch drag state
var touchDrag={active:false,ghost:null,srcSec:null,srcIdx:null,overIdx:null,startY:0,items:null};

function startTouchDrag(e,sec,idx){
  var src=e.currentTarget;
  var rect=src.getBoundingClientRect();
  var ghost=src.cloneNode(true);
  ghost.className=src.className+' touch-dragging';
  ghost.style.width=rect.width+'px';
  ghost.style.top=rect.top+'px';
  ghost.style.left=rect.left+'px';
  document.body.appendChild(ghost);
  touchDrag.active=true;touchDrag.ghost=ghost;touchDrag.srcSec=sec;touchDrag.srcIdx=idx;
  touchDrag.startY=e.touches[0].clientY;touchDrag.overIdx=idx;
  src.style.opacity='.3';
  e.preventDefault();
}

function onTouchMove(e){
  if(!touchDrag.active)return;
  e.preventDefault();
  var t=e.touches[0];
  var dy=t.clientY-touchDrag.startY;
  touchDrag.ghost.style.top=(parseFloat(touchDrag.ghost.style.top)+dy)+'px';
  touchDrag.startY=t.clientY;
  // find element under touch
  touchDrag.ghost.style.display='none';
  var el=document.elementFromPoint(t.clientX,t.clientY);
  touchDrag.ghost.style.display='';
  if(el){
    var card=el.closest ? el.closest('[data-drag-idx]') : null;
    if(card&&card.getAttribute('data-drag-sec')===touchDrag.srcSec){
      var idx=parseInt(card.getAttribute('data-drag-idx'));
      if(idx!==touchDrag.overIdx){
        touchDrag.overIdx=idx;
        var arr=state.items[touchDrag.srcSec].slice();
        var moved=arr.splice(touchDrag.srcIdx,1)[0];
        arr.splice(idx,0,moved);
        state.items[touchDrag.srcSec]=arr;
        touchDrag.srcIdx=idx;
        renderSection(touchDrag.srcSec);
      }
    }
  }
}

function onTouchEnd(){
  if(!touchDrag.active)return;
  if(touchDrag.ghost)touchDrag.ghost.remove();
  touchDrag.active=false;
  sv(KEYS.items,state.items);
  render();
}

document.addEventListener('touchmove',onTouchMove,{passive:false});
document.addEventListener('touchend',onTouchEnd);

function renderSection(sec){
  var el=document.getElementById('section-items-'+sec);
  if(el)buildSectionItems(sec,el);
}

function buildSectionItems(sec,container){
  container.innerHTML='';
  var s=state;
  var meta=SEC_META[sec];
  s.items[sec].forEach(function(item,idx){
    if(item.group){
      var gid=sec+'-'+item.id;
      var expanded=!!s.expandedGroups[gid];
      var gDone=item.group.filter(function(_,i){return s.checks[gid+'-'+i];}).length;
      var allDone=gDone===item.group.length;
      var gc=mk('div','group-card no-select');
      gc.setAttribute('data-drag-idx',idx);gc.setAttribute('data-drag-sec',sec);

      var gh=mk('div','group-header');
      var gchk=mk('div','group-check');
      if(allDone){gchk.style.background=meta.accent;gchk.style.borderColor=meta.accent;gchk.style.boxShadow='0 2px 8px '+meta.accent+'66';ap(gchk,svgCheck(12,'2'));}
      else if(gDone>0){var dot=mk('div');dot.style.cssText='width:10px;height:10px;border-radius:50%;background:'+meta.accent;ap(gchk,dot);}
      var glbl=mk('span','group-label');glbl.textContent=item.label;
      var gp=mk('span','group-progress');gp.textContent=gDone+'/'+item.group.length;
      var chev=mk('span','group-chevron'+(expanded?' open':''));chev.textContent='▼';
      ap(gh,gchk,glbl,gp,chev);

      if(s.editMode){
        var grb=mk('button','btn btn-icon btn-sm danger');grb.textContent='✕';
        grb.addEventListener('click',function(e){e.stopPropagation();s.items[sec]=s.items[sec].filter(function(it){return it.id!==item.id;});sv(KEYS.items,s.items);render();});
        ap(gh,grb);
        gh.addEventListener('touchstart',function(e){if(e.target===grb||grb.contains(e.target))return;startTouchDrag(e,sec,idx);},{passive:false});
      }
      gh.addEventListener('click',function(){s.expandedGroups[gid]=!s.expandedGroups[gid];render();});
      ap(gc,gh);

      if(expanded){
        var gch=mk('div','group-children');
        item.group.forEach(function(sub,i){
          var sid=gid+'-'+i;var done2=!!s.checks[sid];
          var child=mk('div','group-child no-select'+(done2?' done':''));
          var cc=mk('div','child-check');
          if(done2){cc.style.background=meta.accent;cc.style.borderColor=meta.accent;ap(cc,svgCheck(10,'1.8'));}
          var cl=mk('span','item-label');cl.textContent=sub;
          ap(child,cc,cl);
          child.addEventListener('click',(function(sid){return function(){s.checks[sid]=!s.checks[sid];sv(KEYS.checks,s.checks);render();};})(sid));
          ap(gch,child);
        });
        ap(gc,gch);
      }
      container.appendChild(gc);
    } else {
      var done=!!s.checks[item.id];
      var editing=s.editMode&&s.editingItem===item.id;
      var card=mk('div','item-card no-select'+(done?' done':''));
      card.setAttribute('data-drag-idx',idx);card.setAttribute('data-drag-sec',sec);

      var chk=mk('div','check-btn');
      if(done){chk.style.background=meta.accent;chk.style.borderColor=meta.accent;chk.style.boxShadow='0 2px 8px '+meta.accent+'55';ap(chk,svgCheck(12,'2'));}
      chk.addEventListener('click',function(e){e.stopPropagation();if(!s.editMode){s.checks[item.id]=!s.checks[item.id];sv(KEYS.checks,s.checks);render();}});

      if(editing){
        var inp=mk('input','item-edit-input');inp.value=item.label;inp.id='edit-item-'+item.id;
        var saveBtn=mk('button','btn btn-sm');saveBtn.textContent='Save';
        saveBtn.style.cssText='background:var(--purple);border-color:var(--purple);color:white;padding:6px 12px;';
        saveBtn.addEventListener('click',function(){
          var el2=document.getElementById('edit-item-'+item.id);
          if(el2&&el2.value.trim()){item.label=el2.value.trim();sv(KEYS.items,s.items);}
          s.editingItem=null;render();
        });
        inp.addEventListener('keydown',function(ev){if(ev.key==='Enter')saveBtn.click();if(ev.key==='Escape'){s.editingItem=null;render();}});
        ap(card,chk,inp,saveBtn);
      } else {
        var lbl=mk('span','item-label');lbl.textContent=item.label;
        ap(card,chk,lbl);
        if(s.editMode){
          var editBtn2=mk('button','btn btn-icon');editBtn2.textContent='✏';editBtn2.style.fontSize='13px';
          editBtn2.addEventListener('click',(function(id){return function(e){e.stopPropagation();s.editingItem=id;render();};})(item.id));
          var rb=mk('button','btn btn-icon danger');rb.textContent='✕';
          rb.addEventListener('click',(function(sec,id){return function(e){e.stopPropagation();s.items[sec]=s.items[sec].filter(function(it){return it.id!==id;});sv(KEYS.items,s.items);render();};})(sec,item.id));
          ap(card,editBtn2,rb);
          card.addEventListener('touchstart',function(e){if(e.target===editBtn2||e.target===rb||e.target===chk||editBtn2.contains(e.target)||rb.contains(e.target))return;startTouchDrag(e,sec,idx);},{passive:false});
        } else {
          card.addEventListener('click',(function(id){return function(){s.checks[id]=!s.checks[id];sv(KEYS.checks,s.checks);render();};})(item.id));
        }
      }
      container.appendChild(card);
    }
  });

  if(s.editMode){
    if(s.addingSection===sec){
      var addCard=mk('div','add-card');
      var addInp=mk('input','','');addInp.placeholder='New item...';addInp.id='add-'+sec;
      var addBtn=mk('button','btn btn-sm');addBtn.textContent='Add';addBtn.style.cssText='background:var(--purple);border-color:var(--purple);color:white;flex-shrink:0;';
      function doAdd(sec){var e2=document.getElementById('add-'+sec);var v=e2?e2.value.trim():'';if(!v)return;s.items[sec].push({id:sec+'-'+Date.now(),label:v});sv(KEYS.items,s.items);s.addingSection=null;render();}
      addBtn.addEventListener('click',(function(sec){return function(){doAdd(sec);};})(sec));
      addInp.addEventListener('keydown',(function(sec){return function(ev){if(ev.key==='Enter')doAdd(sec);};})(sec));
      ap(addCard,addInp,addBtn);container.appendChild(addCard);
    } else {
      var addRow=mk('button','btn-ghost');addRow.style.cssText='width:100%;text-align:center;padding:10px;border:1px dashed var(--border2);border-radius:var(--r);font-size:13px;color:var(--text3);';
      addRow.textContent='+ Add item';
      addRow.addEventListener('click',(function(sec){return function(){s.addingSection=sec;render();};})(sec));
      container.appendChild(addRow);
    }
  }
}

function render(){
  var s=state;
  var root=document.getElementById('app');root.innerHTML='';
  var totalToday=SECTIONS.reduce(function(a,sec){return a+countItems(s.items[sec]);},0);
  var doneToday=SECTIONS.reduce(function(a,sec){return a+countDone(s.items[sec],s.checks,sec);},0);
  var wDone=s.wItems.filter(function(_,i){return s.wChecks[i];}).length;
  var pct=totalToday?Math.round(doneToday/totalToday*100):0;
  var circ=2*Math.PI*22;var offset=circ*(1-pct/100);
  var today=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  // HEADER
  var header=mk('div','header');
  var dateEl=mk('div','date-label');dateEl.textContent=today;
  var greet=mk('div','greeting');greet.textContent='Good day \uD83D\uDC4B';

  var pcard=mk('div','progress-card');
  var ns='http://www.w3.org/2000/svg';
  var svg=document.createElementNS(ns,'svg');svg.setAttribute('width','60');svg.setAttribute('height','60');svg.setAttribute('viewBox','0 0 56 56');svg.style.transform='rotate(-90deg)';
  var defs=document.createElementNS(ns,'defs');
  var grad=document.createElementNS(ns,'linearGradient');grad.setAttribute('id','ringGrad');grad.setAttribute('x1','0%');grad.setAttribute('y1','0%');grad.setAttribute('x2','100%');grad.setAttribute('y2','0%');
  var s1=document.createElementNS(ns,'stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color','#9d8fe8');
  var s2=document.createElementNS(ns,'stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color','#c084fc');
  ap(grad,s1,s2);ap(defs,grad);svg.appendChild(defs);
  var rbg=document.createElementNS(ns,'circle');rbg.setAttribute('class','ring-bg');rbg.setAttribute('cx','28');rbg.setAttribute('cy','28');rbg.setAttribute('r','22');
  var rfg=document.createElementNS(ns,'circle');rfg.setAttribute('class','ring-fg');rfg.setAttribute('cx','28');rfg.setAttribute('cy','28');rfg.setAttribute('r','22');rfg.setAttribute('stroke-dasharray',circ);rfg.setAttribute('stroke-dashoffset',offset);
  ap(svg,rbg,rfg);
  var rw=mk('div','ring-wrap');
  var rpct=mk('div','ring-pct');rpct.textContent=pct+'%';
  ap(rw,svg,rpct);

  var info=mk('div','progress-info');
  var pm2=mk('div','progress-main');pm2.textContent=doneToday+' of '+totalToday+' done today';
  var ps=mk('div','progress-sub');ps.textContent=wDone+' of '+s.wItems.length+' weekly intentions';
  ap(info,pm2,ps);

  var btnRow=mk('div','btn-row');
  if(s.editMode){
    var resetBtn=mk('button','btn btn-sm danger');resetBtn.textContent='Reset';
    resetBtn.addEventListener('click',function(){if(confirm('Reset everything to defaults?')){Object.keys(KEYS).forEach(function(k){localStorage.removeItem(KEYS[k]);});location.reload();}});
    ap(btnRow,resetBtn);
  }
  var editBtn=mk('button','btn btn-sm'+(s.editMode?' active':''));editBtn.textContent=s.editMode?'Done':'Edit';
  editBtn.addEventListener('click',function(){s.editMode=!s.editMode;s.addingSection=null;s.editingItem=null;s.editingTask=null;render();});
  ap(btnRow,editBtn);
  ap(pcard,rw,info,btnRow);
  ap(header,dateEl,greet,pcard);
  root.appendChild(header);

  // DAILY SECTIONS
  SECTIONS.forEach(function(sec){
    var meta=SEC_META[sec];
    var secDone=countDone(s.items[sec],s.checks,sec);
    var secTotal=countItems(s.items[sec]);
    var section=mk('div','section');
    var sh=mk('div','section-header');
    var pill=mk('div','section-pill');
    var dot=mk('div','section-dot');dot.style.background=meta.accent;
    var name=mk('span','section-name');name.textContent=meta.label;
    ap(pill,dot,name);
    var cnt=mk('span','section-count');cnt.textContent=secDone+'/'+secTotal;
    ap(sh,pill,cnt);
    ap(section,sh);
    if(s.editMode){var hint=mk('div','hint');hint.textContent='Long press to reorder';ap(section,hint);}
    var itemsContainer=mk('div','');itemsContainer.id='section-items-'+sec;
    buildSectionItems(sec,itemsContainer);
    ap(section,itemsContainer);
    root.appendChild(section);
  });

  // TASKS
  var tSection=mk('div','widget-section');
  var tsh=mk('div','widget-header');
  var tl=mk('span','widget-label');tl.textContent="This week's tasks";
  var tc=mk('span','widget-count');tc.textContent=s.tasks.filter(function(t){return t.done;}).length+'/'+s.tasks.length;
  var tal=mk('button','btn-ghost');tal.textContent=s.showAddTask?'cancel':'+ add';
  tal.addEventListener('click',function(){s.showAddTask=!s.showAddTask;render();});
  ap(tsh,tl,tc,tal);ap(tSection,tsh);
  if(s.editMode){var th=mk('div','hint');th.style.marginBottom='8px';th.textContent='Long press to reorder';ap(tSection,th);}

  if(s.showAddTask){
    var taa=mk('div','add-card');
    var tai=mk('input');tai.placeholder='New task...';tai.id='add-task';tai.style.cssText='flex:1;font-size:15px;color:var(--text);background:none;border:none;outline:none;font-family:inherit;font-weight:500;';
    var tab=mk('button','btn btn-sm');tab.textContent='Add';tab.style.cssText='background:var(--teal);border-color:var(--teal);color:white;flex-shrink:0;';
    function doAddTask(){var e2=document.getElementById('add-task');var v=e2?e2.value.trim():'';if(!v)return;s.tasks.push({id:'t-'+Date.now(),label:v,done:false});sv(KEYS.tasks,s.tasks);s.showAddTask=false;render();}
    tab.addEventListener('click',doAddTask);tai.addEventListener('keydown',function(ev){if(ev.key==='Enter')doAddTask();});
    ap(taa,tai,tab);tSection.appendChild(taa);
  }

  var taskDragFrom=null,taskGhost=null,taskStartY=0;
  s.tasks.forEach(function(task,i){
    var editing=s.editingTask===task.id;
    var tc2=mk('div','task-card no-select'+(task.done?' done':''));
    var nb=mk('div','num-badge '+(i===0?'top':'rest'));nb.textContent=i+1;

    if(editing){
      var tei=mk('input','task-edit-input');tei.value=task.label;tei.id='edit-task-'+task.id;
      var tsave=mk('button','btn btn-sm');tsave.textContent='Save';tsave.style.cssText='background:var(--purple);border-color:var(--purple);color:white;flex-shrink:0;';
      tsave.addEventListener('click',(function(task){return function(){var e2=document.getElementById('edit-task-'+task.id);if(e2&&e2.value.trim()){task.label=e2.value.trim();sv(KEYS.tasks,s.tasks);}s.editingTask=null;render();};})(task));
      tei.addEventListener('keydown',(function(task){return function(ev){if(ev.key==='Enter'){var e2=document.getElementById('edit-task-'+task.id);if(e2&&e2.value.trim()){task.label=e2.value.trim();sv(KEYS.tasks,s.tasks);}s.editingTask=null;render();}}})(task));
      ap(tc2,nb,tei,tsave);
    } else {
      var tl2=mk('span','task-label');tl2.textContent=task.label;
      tl2.addEventListener('click',(function(id){return function(){s.tasks=s.tasks.map(function(t){return t.id===id?{id:t.id,label:t.label,done:!t.done}:t;});sv(KEYS.tasks,s.tasks);render();};})(task.id));
      ap(tc2,nb,tl2);
      var trb=mk('button','btn btn-icon danger');trb.textContent='✕';
      trb.addEventListener('click',(function(id){return function(){s.tasks=s.tasks.filter(function(t){return t.id!==id;});sv(KEYS.tasks,s.tasks);render();};})(task.id));
      if(s.editMode){
        var teb=mk('button','btn btn-icon');teb.textContent='✏';teb.style.fontSize='13px';
        teb.addEventListener('click',(function(id){return function(){s.editingTask=id;render();};})(task.id));
        ap(tc2,teb,trb);
      } else {
        ap(tc2,trb);
      }
    }

    // touch drag for tasks
    tc2.addEventListener('touchstart',function(e){
      if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT')return;
      var src=tc2;var rect=src.getBoundingClientRect();
      taskGhost=src.cloneNode(true);
      taskGhost.style.cssText='position:fixed;pointer-events:none;z-index:1000;opacity:.85;transform:scale(1.03);box-shadow:0 8px 30px rgba(0,0,0,.5);border-radius:var(--r);width:'+rect.width+'px;top:'+rect.top+'px;left:'+rect.left+'px;';
      document.body.appendChild(taskGhost);
      taskDragFrom=i;taskStartY=e.touches[0].clientY;
      src.style.opacity='.3';
      e.preventDefault();
    },{passive:false});

    tc2.addEventListener('touchmove',function(e){
      if(taskDragFrom===null||!taskGhost)return;
      e.preventDefault();
      var dy=e.touches[0].clientY-taskStartY;
      taskGhost.style.top=(parseFloat(taskGhost.style.top)+dy)+'px';
      taskStartY=e.touches[0].clientY;
      taskGhost.style.display='none';
      var under=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
      taskGhost.style.display='';
      if(under){
        var tcard=under.closest?under.closest('[data-task-idx]'):null;
        if(tcard){
          var tidx=parseInt(tcard.getAttribute('data-task-idx'));
          if(tidx!==taskDragFrom){
            var arr=s.tasks.slice();var moved=arr.splice(taskDragFrom,1)[0];arr.splice(tidx,0,moved);
            s.tasks=arr;taskDragFrom=tidx;sv(KEYS.tasks,s.tasks);render();
          }
        }
      }
    },{passive:false});

    tc2.addEventListener('touchend',function(){if(taskGhost){taskGhost.remove();taskGhost=null;}taskDragFrom=null;render();});
    tc2.setAttribute('data-task-idx',i);
    tSection.appendChild(tc2);
  });
  root.appendChild(tSection);

  // WEEKLY
  var wSection=mk('div','widget-section');
  var wsh=mk('div','widget-header');
  var wl=mk('span','widget-label');wl.textContent='Weekly intentions';
  var wc2=mk('span','widget-count');wc2.textContent=wDone+'/'+s.wItems.length;
  ap(wsh,wl,wc2);
  if(s.editMode){
    var wal=mk('button','btn-ghost');wal.textContent=s.showAddWeekly?'cancel':'+ add';
    wal.addEventListener('click',function(){s.showAddWeekly=!s.showAddWeekly;render();});
    ap(wsh,wal);
  }
  ap(wSection,wsh);
  var pw=mk('div','pills-wrap');
  s.wItems.forEach(function(item,i){
    var done=!!s.wChecks[i];
    var pill=mk('div','intent-pill no-select'+(done?' done':''));
    if(done){var pc=mk('span','pill-check');pc.textContent='✓';ap(pill,pc);}
    var plbl=mk('span','pill-label');plbl.textContent=item;ap(pill,plbl);
    if(s.editMode){
      var prb=mk('button','btn-ghost');prb.style.cssText='font-size:11px;color:var(--text3);margin-left:2px;';prb.textContent='✕';
      prb.addEventListener('click',(function(i){return function(e){e.stopPropagation();s.wItems.splice(i,1);sv(KEYS.wItems,s.wItems);render();};})(i));
      ap(pill,prb);
    }
    pill.addEventListener('click',(function(i){return function(){s.wChecks[i]=!s.wChecks[i];sv(KEYS.wChecks,s.wChecks);render();};})(i));
    pw.appendChild(pill);
  });
  if(s.editMode&&s.showAddWeekly){
    var war=mk('div','add-card');war.style.marginTop='8px';
    var wai=mk('input');wai.placeholder='Add intention...';wai.id='add-weekly';wai.style.cssText='flex:1;font-size:14px;color:var(--text);background:none;border:none;outline:none;font-family:inherit;';
    var wab=mk('button','btn btn-sm');wab.textContent='Add';wab.style.cssText='background:var(--amber);border-color:var(--amber);color:#000;flex-shrink:0;font-weight:700;';
    function doAddW(){var e2=document.getElementById('add-weekly');var v=e2?e2.value.trim():'';if(!v)return;s.wItems.push(v);sv(KEYS.wItems,s.wItems);s.showAddWeekly=false;render();}
    wab.addEventListener('click',doAddW);wai.addEventListener('keydown',function(ev){if(ev.key==='Enter')doAddW();});
    ap(war,wai,wab);pw.appendChild(war);
  }
  ap(wSection,pw);root.appendChild(wSection);

  // COMING UP
  var bSection=mk('div','widget-section');
  var bsh=mk('div','widget-header');
  var bl=mk('span','widget-label');bl.textContent='Coming up';
  var bal=mk('button','btn-ghost');bal.textContent=s.showAddBP?'cancel':'+ add';
  bal.addEventListener('click',function(){s.showAddBP=!s.showAddBP;render();});
  ap(bsh,bl,bal);ap(bSection,bsh);
  if(s.showAddBP){
    var bForm=mk('div','add-card');bForm.style.flexDirection='column';bForm.style.gap='8px';bForm.style.alignItems='stretch';
    var bti=mk('input');bti.placeholder='Event or task...';bti.id='bp-title';bti.style.cssText='font-size:15px;color:var(--text);background:none;border:none;outline:none;font-family:inherit;font-weight:500;border-bottom:1px solid var(--border2);padding-bottom:8px;';
    var bni=mk('input');bni.placeholder='Prep notes (optional)...';bni.id='bp-note';bni.style.cssText='font-size:14px;color:var(--text2);background:none;border:none;outline:none;font-family:inherit;';
    var bsb=mk('button','btn btn-sm');bsb.textContent='Save';bsb.style.cssText='background:var(--purple);border-color:var(--purple);color:white;align-self:flex-end;';
    function doAddBP(){var t=document.getElementById('bp-title');var n=document.getElementById('bp-note');var tv=t?t.value.trim():'';if(!tv)return;s.bp.push({id:Date.now(),title:tv,note:n?n.value.trim():'',done:false});sv(KEYS.bp,s.bp);s.showAddBP=false;render();}
    bsb.addEventListener('click',doAddBP);bni.addEventListener('keydown',function(ev){if(ev.key==='Enter')doAddBP();});
    ap(bForm,bti,bni,bsb);bSection.appendChild(bForm);
  }
  if(!s.bp.length){var emp=mk('div');emp.style.cssText='font-size:14px;color:var(--text3);padding:8px 0;';emp.textContent='Nothing added yet.';bSection.appendChild(emp);}
  s.bp.forEach(function(item){
    var cr=mk('div','coming-card no-select'+(item.done?' done':''));
    var cdot=mk('div','coming-dot');
    if(item.done){cdot.style.background='var(--text3)';}else{cdot.style.background='var(--purple)';cdot.style.borderColor='var(--purple)';}
    var ctx=mk('div');ctx.style.flex='1';
    var ctitle=mk('div','coming-title');ctitle.textContent=item.title;ap(ctx,ctitle);
    if(item.note&&!item.done){var cn=mk('div','coming-note');cn.textContent=item.note;ap(ctx,cn);}
    var crb=mk('button','btn btn-icon danger');crb.textContent='✕';
    crb.addEventListener('click',(function(id){return function(e){e.stopPropagation();s.bp=s.bp.filter(function(i){return i.id!==id;});sv(KEYS.bp,s.bp);render();};})(item.id));
    ap(cr,cdot,ctx,crb);
    cr.addEventListener('click',(function(id){return function(){s.bp=s.bp.map(function(i){return i.id===id?{id:i.id,title:i.title,note:i.note,done:!i.done}:i;});sv(KEYS.bp,s.bp);render();};})(item.id));
    bSection.appendChild(cr);
  });
  root.appendChild(bSection);

  // Focus
  setTimeout(function(){
    var ids=['add-'+s.addingSection,'add-task','add-weekly','bp-title'];
    for(var i=0;i<ids.length;i++){var f=document.getElementById(ids[i]);if(f){f.focus();break;}}
    if(s.editingItem){var f2=document.getElementById('edit-item-'+s.editingItem);if(f2)f2.focus();}
    if(s.editingTask){var f3=document.getElementById('edit-task-'+s.editingTask);if(f3)f3.focus();}
  },50);
}
render();
</script>
</body>
</html>
